#*.hostD.bridging.vlanPolicy.outboundFilter.acceptedVlanIds = {"eth0" : [20]}

*.host*.bridging.vlanPolicy.typename = "VlanPolicyLayer"
*.hostA.bridging.vlanPolicy.outboundMapper.mappedVlanIds = {"eth0" : {"-1" : 10}}
*.hostC.bridging.vlanPolicy.outboundMapper.mappedVlanIds = {"eth0" : {"-1" : 10}}
*.hostB.bridging.vlanPolicy.outboundMapper.mappedVlanIds = {"eth0" : {"-1" : 20}}
*.hostD.bridging.vlanPolicy.outboundMapper.mappedVlanIds = {"eth0" : {"-1" : 20}}

*.switch*.bridging.vlanPolicy.typename = "VlanPolicyLayer"
*.switch1.bridging.vlanPolicy.inboundFilter.acceptedVlanIds = {"0" : [10], "1" : [20], "2" : [10, 20]}
*.switch1.bridging.vlanPolicy.outboundFilter.acceptedVlanIds = {"0" : [10], "1" : [20], "2" : [10, 20]}
*.switch2.bridging.vlanPolicy.inboundFilter.acceptedVlanIds = {"0" : [10, 20], "1" : [10], "2" : [20]}
*.switch2.bridging.vlanPolicy.outboundFilter.acceptedVlanIds = {"0" : [10, 20], "1" : [10], "2" : [20]}



# IP addresses
*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false

# IP addresses
*.configurator.config = xmldoc("ipv4config.xml")

# MAC addresses
*.hostA.eth[0].address = "00:1A:2B:3C:4D:5E"
*.hostB.eth[0].address = "14:7D:DA:11:22:33"
*.hostC.eth[0].address = "3C:52:82:AA:BB:CC"
*.hostD.eth[0].address = "A4:5E:60:10:20:30"

# Generate traffic to trigger ARP and MAC learning
*.hostA.numApps = 3
*.hostA.app[0].typename = "UdpBasicApp"
*.hostA.app[0].destAddresses = "hostC"
*.hostA.app[0].destPort = 5000
*.hostA.app[0].messageLength = 1000B
*.hostA.app[0].sendInterval = 1s
*.hostA.app[0].startTime = 1s

*.hostA.app[1].typename = "UdpBasicApp"
*.hostA.app[1].destAddresses = "hostB"
*.hostA.app[1].destPort = 5000
*.hostA.app[1].messageLength = 1000B
*.hostA.app[1].sendInterval = 1s
*.hostA.app[1].startTime = 3s

*.hostA.app[2].typename = "UdpSink"
*.hostA.app[2].localPort = 5000

*.hostB.numApps = 3
*.hostB.app[0].typename = "UdpBasicApp"
*.hostB.app[0].destAddresses = "hostD"
*.hostB.app[0].destPort = 5000
*.hostB.app[0].messageLength = 1000B
*.hostB.app[0].sendInterval = 1s
*.hostB.app[0].startTime = 2s

*.hostB.app[1].typename = "UdpBasicApp"
*.hostB.app[1].destAddresses = "hostA"
*.hostB.app[1].destPort = 5000
*.hostB.app[1].messageLength = 1000B
*.hostB.app[1].sendInterval = 1s
*.hostB.app[1].startTime = 4s

*.hostB.app[2].typename = "UdpSink"
*.hostB.app[2].localPort = 5000

*.hostC.numApps = 1
*.hostC.app[0].typename = "UdpSink"
*.hostC.app[0].localPort = 5000

*.hostD.numApps = 1
*.hostD.app[0].typename = "UdpSink"
*.hostD.app[0].localPort = 5000