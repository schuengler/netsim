[General]
network = subnet
sim-time-limit = 30s


*.visualizer.osgVisualizer.typename = ""
*.visualizer.canvasVisualizer.interfaceTableVisualizer.displayInterfaceTables = true
*.visualizer.canvasVisualizer.interfaceTableVisualizer.nodeFilter = "*"
*.visualizer.canvasVisualizer.interfaceTableVisualizer.interfaceFilter = "eth*" 
*.visualizer.canvasVisualizer.interfaceTableVisualizer.format = "%a"
*.visualizer.canvasVisualizer.interfaceTableVisualizer.labelColor = "darkblue"
*.visualizer.canvasVisualizer.interfaceTableVisualizer.fontSize = 9

####################################################
# Gemeinsame Configurator-Einstellungen
####################################################

*.configurator.config = xmldoc("routes.xml")

# WICHTIG: XML soll Routing setzen
*.configurator.addStaticRoutes = true
*.configurator.addDefaultRoutes = true

**.ipv4.routingTable.dumpRoutes = true


####################################################
# CONFIG 1: DIREKT (hostA → hostB)
####################################################

[Config subnet-direct]

*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "128.96.34.16"   # hostB
*.hostA.app[0].startTime = 1s
*.hostA.app[0].sendInterval = 2s


####################################################
# CONFIG 2: INDIREKT (hostA → hostC über Router)
####################################################

[Config subnet-indirect]

*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "128.96.34.139"  # hostC
*.hostA.app[0].startTime = 1s
*.hostA.app[0].sendInterval = 2s