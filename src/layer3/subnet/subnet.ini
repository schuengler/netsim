[General]
network = subnet
sim-time-limit = 30s

[Config subnet]
# Routing automatisch erzeugen
*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false

*.configurator.config = xmldoc("routes.xml")

####################################################
# Host A (oben links)
####################################################

*.hostA.numApps = 1
*.hostA.app[0].typename = "PingApp"
*.hostA.app[0].destAddr = "128.96.34.139"
*.hostA.app[0].startTime = 1s
*.hostA.app[0].sendInterval = 2s

*.hostA.ipv4.arp.retryTimeout = 1s

####################################################
# IP-Konfiguration
####################################################

*.hostA.ipv4.configurator.address = "128.96.34.15"
*.hostA.ipv4.configurator.netmask = "255.255.255.128"

*.hostC.ipv4.configurator.address = "128.96.34.139"
*.hostC.ipv4.configurator.netmask = "255.255.255.128"

*.hostD.ipv4.configurator.address = "128.96.33.14"
*.hostD.ipv4.configurator.netmask = "255.255.255.0"

####################################################
# Router 1
####################################################

*.r1.ipv4.configurator.interfaces = "eth0 eth1"

*.r1.ipv4.configurator.addresses = "128.96.34.1 128.96.34.130"

*.r1.ipv4.configurator.netmasks = \
    "255.255.255.128 255.255.255.128"

####################################################
# Router 2
####################################################

*.r2.ipv4.configurator.interfaces = "eth0 eth1"

*.r2.ipv4.configurator.addresses = \
    "128.96.34.129 128.96.33.1"

*.r2.ipv4.configurator.netmasks = \
    "255.255.255.128 255.255.255.0"


**.ipv4.routingTable.dumpRoutes = true

####################################################
# Visualisierung
####################################################

*.visualizer.*.packetFlowVisualizer.displayPacketFlows = true
*.visualizer.*.packetFlowVisualizer.fadeOutMode = "simulationTime"

